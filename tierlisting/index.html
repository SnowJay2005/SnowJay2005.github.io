<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tierlisting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header id="app-header">
  <div id="header-left">
    <span id="app-title">TIER<span class="accent">LIST</span></span>
  </div>
  <div id="header-right">
    <button id="undoBtn" class="hdr-btn" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button id="redoBtn" class="hdr-btn" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
    <button id="imageAdder" class="hdr-btn" title="Add Images">+ Images</button>
    <button id="generatorBtn" class="hdr-btn" title="Generate images from text">+ Text</button>
    <button id="exportImageBtn" class="hdr-btn" title="Export as PNG">Export PNG</button>
    <button id="export-btn" class="hdr-btn desktop-only" title="Export JSON">Export JSON</button>
    <button id="import-btn" class="hdr-btn desktop-only" title="Import JSON">Import JSON</button>
    <button id="reset-btn" class="hdr-btn danger desktop-only" title="Reset">Reset</button>
    <button id="hamburgerBtn" class="hdr-btn mobile-only" title="More">⋮</button>
  </div>
</header>

<div id="hamburger-menu" class="hidden">
  <button id="hm-export-btn" class="hdr-btn">Export JSON</button>
  <button id="hm-import-btn" class="hdr-btn">Import JSON</button>
  <button id="hm-reset-btn" class="hdr-btn danger">Reset</button>
</div>

<main id="app-body">
  <div id="tiers"></div>
  <div id="add-tier-row">
    <button id="add-tier-btn">+ Add Tier</button>
  </div>
</main>

<div id="pool-wrapper">
  <div id="pool-header">
    <span id="pool-title">Image Pool</span>
    <div id="pool-header-right">
      <input type="search" id="searchInput" placeholder="Search…" autocomplete="off" />
      <button id="sortPoolBtn" class="hdr-btn small" title="Sort pool A-Z">A-Z</button>
      <button id="trash-button" class="hdr-btn small" title="Drag items here to delete">🗑</button>
      <button id="pinToggleBtn" class="hdr-btn small">📌 Pin</button>
    </div>
  </div>
  <div id="image-pool"></div>
</div>

<!-- Export modal -->
<div id="export-modal" class="modal hidden">
  <div class="modal-content export-modal-content">
    <div class="modal-header">
      <h2>Export Tierlist</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="export-layout">
      <div class="export-settings">
        <label class="export-setting">
          <span>Format</span>
          <select id="exportFormat">
            <option value="image/webp" selected>WebP</option>
            <option value="image/png">PNG</option>
          </select>
        </label>
        <label class="export-setting">
          <span>Scale</span>
          <select id="exportScale">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="3">3×</option>
            <option value="4">4×</option>
          </select>
        </label>
        <label class="export-setting">
          <span>Items per row</span>
          <input type="number" id="exportItemsPerRow" min="1" max="200" value="20" />
        </label>
        <label class="export-setting">
          <span>Show labels</span>
          <input type="checkbox" id="exportShowLabels" />
        </label>
        <div class="export-setting">
          <span>Auto-fit</span>
          <div style="display:flex;gap:4px;">
            <button id="export-autofit-square" class="hdr-btn small">1:1</button>
            <button id="export-autofit-169" class="hdr-btn small">16:9</button>
            <button id="export-autofit-wide" class="hdr-btn small">Wide</button>
          </div>
        </div>
        <button id="export-preview-btn" class="hdr-btn">Preview</button>
        <button id="download-png" class="big-btn">Download</button>
      </div>
      <div class="export-preview-wrap">
        <img id="exportPreviewImg" style="display:none;max-width:100%;border-radius:2px;" alt="preview" />
        <div id="export-preview-hint">Press Preview to generate</div>
      </div>
    </div>
  </div>
</div>

<!-- Group name modal -->
<div id="group-modal" class="modal hidden">
  <div class="modal-content narrow">
    <div class="modal-header">
      <h2>Create Group</h2>
      <button class="modal-close">✕</button>
    </div>
    <input type="text" id="group-name-input" placeholder="Group name..." />
    <button id="group-confirm-btn" class="big-btn">Create Group</button>
  </div>
</div>

<!-- Rename modal -->
<div id="rename-modal" class="modal hidden">
  <div class="modal-content narrow">
    <div class="modal-header">
      <h2 id="rename-modal-title">Rename</h2>
      <button class="modal-close">✕</button>
    </div>
    <textarea id="rename-input" rows="3"></textarea>
    <button id="rename-confirm" class="big-btn">Rename</button>
  </div>
</div>

<!-- Context menu -->
<div id="context-menu" class="hidden">
  <div class="ctx-option" data-action="inspect">🔍 Inspect</div>
  <div class="ctx-option" data-action="rename">✏️ Rename</div>
  <div class="ctx-option" data-action="group">📁 Group selected</div>
  <div class="ctx-option" data-action="ungroup">📂 Ungroup</div>
  <div class="ctx-option" data-action="recolor" style="display:none">🎨 Change color</div>
  <div class="ctx-option danger" data-action="delete">🗑 Delete</div>
</div>

<!-- Inspect overlay -->
<div id="inspect-overlay" class="hidden">
  <div id="inspect-inner">
    <img id="inspect-img" alt="" />
    <div id="inspect-name"></div>
  </div>
</div>

<!-- Generator modal -->
<div id="generator-modal" class="modal hidden">
  <div class="modal-content generator-modal-content">
    <div class="modal-header">
      <h2>Generate Images</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="generator-layout">
      <div class="generator-settings">
        <label class="export-setting">
          <span>Lines</span>
        </label>
        <textarea id="generatorLines" placeholder="One item per line..." rows="10"></textarea>

        <div class="export-setting" style="margin-top:8px;">
          <span>Background</span>
          <div style="display:flex;gap:6px;align-items:center;">
            <div id="genBgColorPickr" class="gen-color-anchor"></div>
            <button id="genBgImageBtn" class="hdr-btn small">Image</button>
            <span id="genBgImageName" style="font-size:0.75rem;color:var(--text-dim);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
          </div>
        </div>

        <label class="export-setting" id="genDimRow" style="display:none;">
          <span>Dim image</span>
          <input type="range" id="genDimAmount" min="0" max="100" value="40" style="flex:1;" />
          <span class="gen-slider-val" id="genDimVal">40%</span>
        </label>

        <div class="export-setting">
          <span>Text color</span>
          <div id="genTextColorPickr" class="gen-color-anchor"></div>
        </div>

        <div class="export-setting">
          <span>Stroke color</span>
          <div id="genStrokeColorPickr" class="gen-color-anchor"></div>
        </div>

        <label class="export-setting">
          <span>Stroke width</span>
          <input type="range" id="genStrokeWidth" min="0" max="12" value="0" style="flex:1;" />
          <span class="gen-slider-val" id="genStrokeVal">0px</span>
        </label>

        <button id="generatorGenerateBtn" class="big-btn">Generate All</button>
      </div>
      <div class="generator-preview-wrap">
        <canvas id="generatorPreviewCanvas" width="200" height="200" style="display:none;border-radius:4px;"></canvas>
        <div id="generator-preview-hint">Adjust settings then press Preview</div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="genBgImageLoader" style="display:none" accept="image/*" />

<input type="file" id="imageLoader" style="display:none" multiple accept="image/*" />
<input type="file" id="import-json" style="display:none" accept="application/json" />

<script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr"></script>
<script src="app.js"></script>
</body>
</html>
